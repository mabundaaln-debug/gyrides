name: Build GY Rides APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace --info

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk gy-rides.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gy-rides-debug-apk
          path: gy-rides.apk

      - name: Publish APK to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: GY Rides — Latest Build
          body: |
            **GY Rides Android App — Debug Build**

            Download and install on any Android device.
            ⚠️ You may need to enable *Install from unknown sources* in your Android settings.
          prerelease: false
          files: gy-rides.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

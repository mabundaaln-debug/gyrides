name: Build GY Rides Android APK (Capacitor)

# ═══════════════════════════════════════════════════════════════════
#  HOW THIS WORKS
# ═══════════════════════════════════════════════════════════════════
#  1. Builds the Vite/React frontend (npm run build)
#  2. Syncs web assets into the Android project (npx cap sync android)
#  3. Compiles a Debug APK (always — no secrets needed)
#  4. Compiles a signed Release APK (when secrets are configured)
#  5. Uploads both APKs as GitHub Actions artifacts
#
#  ONE-TIME SETUP — add these 4 secrets to your GitHub repo:
#  ─────────────────────────────────────────────────────────
#  Repo → Settings → Secrets → Actions → New repository secret
#
#    KEYSTORE_BASE64    = keystore file encoded as base64
#    KEYSTORE_PASSWORD  = your keystore password
#    KEY_ALIAS          = gyrides
#    KEY_PASSWORD       = your key password (often same as keystore)
#
#  To generate a keystore (run once on your PC / Mac):
#
#    keytool -genkeypair -v \
#      -keystore gyrides.keystore \
#      -alias gyrides \
#      -keyalg RSA -keysize 2048 \
#      -validity 10000 \
#      -dname "CN=GY Rides,O=Mpfuno Medical Services,L=Giyani,C=ZA"
#
#  To encode it:
#    macOS:  base64 -i gyrides.keystore | tr -d '\n'
#    Linux:  base64 -w 0 gyrides.keystore
# ═══════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 3. Node 20 ───────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Install dependencies ───────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Build Vite frontend ────────────────────────────────────
      - name: Build frontend
        run: npx vite build

      # ── 6. Sync web assets into Android project ───────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 7. Cache Gradle ───────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 8. Make Gradle executable ─────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Debug APK (sideloadable — no signing needed) ──────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GYRides-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 10. Signed Release APK (requires secrets) ─────────────────
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/gyrides-release.keystore

      - name: Build Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/gyrides-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      - name: Upload Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: GYRides-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── 11. GitHub Release on version tag ─────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          name: GY Rides ${{ github.ref_name }}
          body: |
            ## GY Rides Android APK — ${{ github.ref_name }}

            ### Install
            1. Download `app-release.apk` (signed) or `app-debug.apk` (debug/sideload)
            2. On your phone: **Settings → Apps → Install unknown apps** → allow your browser
            3. Open the downloaded APK and tap **Install**

            Minimum Android: 7.0 (API 24)

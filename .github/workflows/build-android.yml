name: Build GY Rides Android APK (TWA)

# ═══════════════════════════════════════════════════════════════════
#  HOW THIS WORKS
# ═══════════════════════════════════════════════════════════════════
#  Bubblewrap (Google's Trusted Web Activity CLI) wraps the deployed
#  Replit URL into a real Android APK.  No Capacitor, no Cordova —
#  the APK opens GY Rides in Chrome's native engine.
#
#  ONE-TIME SETUP (do this once on your laptop / PC)
# ═══════════════════════════════════════════════════════════════════
#  STEP 1 — Generate a signing keystore
#  ──────────────────────────────────────────────────────────────────
#  Run this in your terminal (requires Java / keytool installed):
#
#    keytool -genkeypair -v \
#      -keystore gyrides.keystore \
#      -alias gyrides \
#      -keyalg RSA -keysize 2048 \
#      -validity 10000 \
#      -dname "CN=GY Rides,OU=Mpfuno Medical,O=Mpfuno Medical Services,L=Giyani,ST=Limpopo,C=ZA"
#
#  It will ask for a password — choose one and remember it.
#
#  STEP 2 — Get the SHA-256 fingerprint
#  ──────────────────────────────────────────────────────────────────
#    keytool -list -v -keystore gyrides.keystore -alias gyrides
#
#  Copy the "SHA256:" line — it looks like:
#    AB:12:CD:34:...
#
#  STEP 3 — Add the fingerprint to Replit secrets
#  ──────────────────────────────────────────────────────────────────
#  In Replit: Secrets (lock icon) → Add secret:
#    Name:  ANDROID_SHA256_FINGERPRINT
#    Value: AB:12:CD:34:...  (the SHA256 from step 2)
#
#  Then redeploy so /.well-known/assetlinks.json serves the fingerprint.
#
#  STEP 4 — Encode the keystore as base64
#  ──────────────────────────────────────────────────────────────────
#  macOS:  base64 -i gyrides.keystore | tr -d '\n'
#  Linux:  base64 -w 0 gyrides.keystore
#
#  STEP 5 — Add these 4 secrets to GitHub
#  ──────────────────────────────────────────────────────────────────
#  GitHub repo → Settings → Secrets → Actions → New repository secret
#
#    KEYSTORE_BASE64    = the base64 string from step 4
#    KEYSTORE_PASSWORD  = password you chose in step 1
#    KEY_ALIAS          = gyrides
#    KEY_PASSWORD       = same password (or your key password if different)
#
#  STEP 6 — Update APP_URL below to your Replit deployment URL
#  ──────────────────────────────────────────────────────────────────
#  Change the APP_URL env var below to match your actual deployed URL,
#  e.g.  https://gyrides-mabundaaln.replit.app
#
#  Then push to main — the APK will appear under Actions > Artifacts.
# ═══════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  # !! UPDATE THIS to your Replit deployed URL !!
  APP_URL: "https://gyrides-mabundaaln.replit.app"
  APP_PACKAGE: "za.co.mpfunomedical.gyrides"
  APP_NAME: "GY Rides"
  APP_VERSION_CODE: "1"
  APP_VERSION_NAME: "1.0.0"
  KEY_ALIAS: "gyrides"

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 (required for Android build tools) ────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 3. Node 20 (for Bubblewrap CLI) ──────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 4. Install Bubblewrap ─────────────────────────────────────
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # ── 5. Accept Android SDK licenses ───────────────────────────
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34" 2>/dev/null || true

      # ── 6. Decode keystore from GitHub secret ────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > gyrides.keystore

      # ── 7. Write the Bubblewrap TWA manifest ─────────────────────
      - name: Write twa-manifest.json
        run: |
          HOST=$(echo "${{ env.APP_URL }}" | sed 's|https://||' | sed 's|http://||')
          cat > twa-manifest.json << MANIFEST
          {
            "packageId": "${{ env.APP_PACKAGE }}",
            "host": "${HOST}",
            "name": "${{ env.APP_NAME }}",
            "launcherName": "GY Rides",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "backgroundColor": "#000000",
            "enableNotifications": true,
            "startUrl": "/",
            "iconUrl": "${{ env.APP_URL }}/gy-logo.png",
            "maskableIconUrl": "${{ env.APP_URL }}/gy-logo-192.png",
            "monochromeIconUrl": "${{ env.APP_URL }}/gy-logo-192.png",
            "splashScreenFadeOutDuration": 600,
            "signingKey": {
              "path": "./gyrides.keystore",
              "alias": "${{ env.KEY_ALIAS }}"
            },
            "appVersionCode": ${{ env.APP_VERSION_CODE }},
            "appVersion": "${{ env.APP_VERSION_NAME }}",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "${{ env.APP_URL }}/manifest.json",
            "fallbackType": "customtabs",
            "features": {
              "locationDelegation": { "enabled": true },
              "playBilling": { "enabled": false }
            },
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullyImmersive": false,
            "minSdkVersion": 24,
            "sdkVersion": 34
          }
          MANIFEST

      # ── 8. Initialise the TWA Android project ────────────────────
      - name: Initialise Bubblewrap project
        run: bubblewrap init --manifest twa-manifest.json

      # ── 9. Build & sign the APK ──────────────────────────────────
      - name: Build & sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build \
            --signingKeyPassphrase "$KEY_PASSWORD" \
            --keystorePassword "$KEYSTORE_PASSWORD"

      # ── 10. Collect the output APK ───────────────────────────────
      - name: Collect APK
        run: |
          mkdir -p output
          # Bubblewrap outputs to app-release-signed.apk
          find . -name "*.apk" ! -path "*/output/*" | while read f; do
            NAME="GYRides-v${{ env.APP_VERSION_NAME }}-${GITHUB_SHA:0:7}.apk"
            cp "$f" "output/$NAME"
            echo "Copied $f → output/$NAME"
          done

      # ── 11. Upload APK as GitHub Actions artifact ─────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GYRides-APK-${{ github.sha }}
          path: output/*.apk
          retention-days: 90

      # ── 12. Attach APK to a GitHub Release (when you push a tag) ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.apk
          name: GY Rides ${{ github.ref_name }}
          body: |
            ## GY Rides Android APK ${{ github.ref_name }}

            Download the APK below and install it directly on any Android phone.

            ### Install steps
            1. Download `GYRides-*.apk`
            2. On your phone: **Settings → Apps → Install unknown apps** → allow your browser/files app
            3. Open the downloaded APK and tap **Install**

            Minimum Android: 7.0 (API 24)

name: Build GY Rides APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor (with server URL)
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK (signed with fixed keystore)
        run: cd android && ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk gy-rides.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gy-rides-debug-apk
          path: gy-rides.apk

      - name: Delete existing latest release (if any)
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/latest \
            | grep '"id"' | head -1 | grep -o '[0-9]*')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID
            echo "Deleted release $RELEASE_ID"
          fi
          git push --delete origin latest 2>/dev/null || true
        continue-on-error: true

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "GY Rides — Latest Build"
          body: |
            **GY Rides Android App — Release Build**

            Tap **gy-rides.apk** below to download and install on your Android device.

            > ⚠️ Before installing: go to **Settings → Security** (or **Apps**) and enable **"Install from unknown sources"** for your browser or file manager.

            Compatible with Android 5.0 (Lollipop, API 21) and above.
          make_latest: "true"
          files: gy-rides.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

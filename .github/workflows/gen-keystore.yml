name: Generate Keystore (one-time)
on:
  workflow_dispatch:
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias gyrides-debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore gyrides-debug.keystore \
            -storepass gyrides123 \
            -keypass gyrides123 \
            -dname "CN=GY Rides, O=Mpfuno Medical Services, L=Giyani, ST=Limpopo, C=ZA" \
            -noprompt
          echo "KEYSTORE_BASE64 value (copy this into GitHub Secrets):"
          echo "---BEGIN---"
          base64 -w 0 gyrides-debug.keystore
          echo ""
          echo "---END---"
